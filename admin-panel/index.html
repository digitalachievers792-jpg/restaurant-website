<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Royal Oak</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0f; color: #f5f5f5; }
    .admin-header { background: #12121a; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(201,168,76,0.3); }
    .admin-header h1 { font-size: 22px; color: #c9a84c; }
    .admin-header a { color: #999; text-decoration: none; font-size: 13px; }
    .admin-header a:hover { color: #c9a84c; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .admin-actions { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    .btn { padding: 12px 25px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: #c9a84c; color: #0a0a0f; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-sm { padding: 8px 16px; font-size: 11px; }
    table { width: 100%; border-collapse: collapse; background: #12121a; border: 1px solid rgba(255,255,255,0.1); }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    th { background: #1a1a2e; color: #c9a84c; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    td { font-size: 13px; color: #ccc; }
    td img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
    .badge { padding: 3px 10px; border-radius: 3px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .badge-success { background: rgba(40,167,69,0.2); color: #28a745; }
    .badge-warning { background: rgba(255,193,7,0.2); color: #ffc107; }
    .empty { text-align: center; padding: 60px; color: #666; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #12121a; padding: 40px; border: 1px solid rgba(201,168,76,0.3); max-width: 500px; width: 90%; }
    .modal-content h2 { color: #c9a84c; margin-bottom: 20px; }
    .modal-content input, .modal-content select, .modal-content textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; border-radius: 4px; }
    .modal-content input:focus, .modal-content select:focus, .modal-content textarea:focus { outline: none; border-color: #c9a84c; }
    .modal-content select option { background: #12121a; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>
  <header class="admin-header">
    <h1><i class="fas fa-crown"></i> Royal Oak Admin</h1>
    <a href="../frontend/index.html"><i class="fas fa-external-link-alt"></i> View Site</a>
  </header>
  <div class="container">
    <div class="admin-actions">
      <a href="#" class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add Menu Item</a>
      <a href="add-menu.html" class="btn btn-primary"><i class="fas fa-utensils"></i> Quick Add</a>
    </div>
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="menuTableBody">
        <tr><td colspan="6" class="empty"><i class="fas fa-spinner fa-spin" style="font-size:24px;margin-bottom:10px;"></i><br>Loading menu items...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="modal" id="menuModal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Menu Item</h2>
      <input type="hidden" id="editId">
      <input type="text" id="itemName" placeholder="Dish Name" required>
      <select id="itemCategory">
        <option value="">Select Category</option>
        <option value="Italian">Italian</option>
        <option value="Chinese">Chinese</option>
        <option value="Continental">Continental</option>
        <option value="Mexican">Mexican</option>
        <option value="Arabic">Arabic</option>
        <option value="Indian">Indian</option>
        <option value="Cocktails">Cocktails</option>
        <option value="Mocktails">Mocktails</option>
        <option value="Wines">Wines</option>
        <option value="Beers">Beers</option>
      </select>
      <input type="number" id="itemPrice" placeholder="Price" step="0.01" required>
      <input type="text" id="itemImage" placeholder="Image URL">
      <textarea id="itemDescription" placeholder="Description" rows="3" required></textarea>
      <div class="modal-actions">
        <button class="btn btn-sm" style="background:#666;color:white;" onclick="closeModal()">Cancel</button>
        <button class="btn btn-sm btn-primary" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';
    const sampleItems = [
      { _id: '1', name: 'Truffle Risotto', category: 'Italian', price: 28, image: 'https://images.unsplash.com/photo-1476124369491-e7addf5db371?w=400&q=80', description: 'Creamy arborio rice with wild mushrooms and black truffle.' },
      { _id: '2', name: 'Kung Pao Shrimp', category: 'Chinese', price: 24, image: 'https://images.unsplash.com/photo-1559847844-5315695dadae?w=400&q=80', description: 'Wok-seared shrimp with Szechuan peppercorns.' },
      { _id: '3', name: 'Grilled Lamb Chops', category: 'Continental', price: 38, image: 'https://images.unsplash.com/photo-1514516345957-556ca7d90a29?w=400&q=80', description: 'Herb-crusted lamb racks with rosemary jus.' },
      { _id: '4', name: 'Butter Chicken', category: 'Indian', price: 22, image: 'https://images.unsplash.com/photo-1588166524941-3b5a88622eb5?w=400&q=80', description: 'Tender chicken in rich creamy tomato sauce.' },
    ];
    let currentItems = [];

    function renderTable(items) {
      const tbody = document.getElementById('menuTableBody');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty"><i class="fas fa-utensils" style="font-size:30px;margin-bottom:10px;color:#c9a84c;"></i><br>No menu items yet. Add your first item!</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(item => `
        <tr>
          <td><img src="${item.image}" alt="" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100&q=80'"></td>
          <td>${item.name}</td>
          <td><span class="badge badge-success">${item.category}</span></td>
          <td>$${item.price}</td>
          <td><span class="badge badge-warning">Active</span></td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editItem('${item._id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteItem('${item._id}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      `).join('');
    }

    async function fetchItems() {
      try {
        const res = await fetch(`${API_URL}/menu`);
        const data = await res.json();
        if (data.success && data.data.length) {
          currentItems = data.data;
        } else {
          currentItems = JSON.parse(localStorage.getItem('adminMenuItems')) || sampleItems;
        }
      } catch {
        currentItems = JSON.parse(localStorage.getItem('adminMenuItems')) || sampleItems;
      }
      renderTable(currentItems);
    }

    function openModal(item = null) {
      document.getElementById('menuModal').style.display = 'flex';
      if (item) {
        document.getElementById('modalTitle').textContent = 'Edit Menu Item';
        document.getElementById('editId').value = item._id;
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemCategory').value = item.category;
        document.getElementById('itemPrice').value = item.price;
        document.getElementById('itemImage').value = item.image || '';
        document.getElementById('itemDescription').value = item.description;
      } else {
        document.getElementById('modalTitle').textContent = 'Add Menu Item';
        document.getElementById('editId').value = '';
        document.getElementById('itemName').value = '';
        document.getElementById('itemCategory').value = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemImage').value = '';
        document.getElementById('itemDescription').value = '';
      }
    }

    function closeModal() { document.getElementById('menuModal').style.display = 'none'; }

    async function saveItem() {
      const id = document.getElementById('editId').value;
      const data = {
        name: document.getElementById('itemName').value,
        category: document.getElementById('itemCategory').value,
        price: parseFloat(document.getElementById('itemPrice').value),
        image: document.getElementById('itemImage').value || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80',
        description: document.getElementById('itemDescription').value,
      };
      if (!data.name || !data.category || !data.price || !data.description) { alert('Please fill all required fields.'); return; }
      try {
        const url = id ? `${API_URL}/menu/${id}` : `${API_URL}/menu`;
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const result = await res.json();
        if (result.success) { closeModal(); fetchItems(); }
        else { throw new Error(result.message); }
      } catch {
        if (id) { const idx = currentItems.findIndex(i => i._id === id); if (idx > -1) { currentItems[idx] = { ...currentItems[idx], ...data }; } }
        else { data._id = Date.now().toString(); currentItems.push(data); }
        localStorage.setItem('adminMenuItems', JSON.stringify(currentItems));
        closeModal(); fetchItems();
      }
    }

    async function deleteItem(id) {
      if (!confirm('Delete this item?')) return;
      try {
        await fetch(`${API_URL}/menu/${id}`, { method: 'DELETE' });
        fetchItems();
      } catch {
        currentItems = currentItems.filter(i => i._id !== id);
        localStorage.setItem('adminMenuItems', JSON.stringify(currentItems));
        fetchItems();
      }
    }

    function editItem(id) {
      const item = currentItems.find(i => i._id === id);
      if (item) openModal(item);
    }

    fetchItems();
  </script>
</body>
</html>

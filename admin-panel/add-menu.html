<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Menu Item | Royal Oak Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0f; color: #f5f5f5; }
    .admin-header { background: #12121a; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(201,168,76,0.3); }
    .admin-header h1 { font-size: 22px; color: #c9a84c; }
    .admin-header a { color: #999; text-decoration: none; font-size: 13px; }
    .admin-header a:hover { color: #c9a84c; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    h2 { color: #c9a84c; margin-bottom: 30px; font-size: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 8px; }
    input, select, textarea { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; font-family: inherit; font-size: 14px; border-radius: 4px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #c9a84c; }
    select option { background: #12121a; }
    textarea { height: 120px; resize: vertical; }
    .btn { padding: 14px 35px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s; }
    .btn-primary { background: #c9a84c; color: #0a0a0f; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-secondary { background: #333; color: white; }
    .form-actions { display: flex; gap: 15px; margin-top: 30px; }
    #message { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
  </style>
</head>
<body>
  <header class="admin-header">
    <h1><i class="fas fa-crown"></i> Royal Oak Admin</h1>
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </header>
  <div class="container">
    <h2><i class="fas fa-utensils"></i> Add New Menu Item</h2>
    <form id="addMenuForm">
      <div class="form-group">
        <label for="name">Dish Name *</label>
        <input type="text" id="name" required placeholder="e.g. Truffle Risotto">
      </div>
      <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" required>
          <option value="">Select Category</option>
          <option value="Italian">Italian</option>
          <option value="Chinese">Chinese</option>
          <option value="Continental">Continental</option>
          <option value="Mexican">Mexican</option>
          <option value="Arabic">Arabic</option>
          <option value="Indian">Indian</option>
          <option value="Cocktails">Cocktails</option>
          <option value="Mocktails">Mocktails</option>
          <option value="Wines">Wines</option>
          <option value="Beers">Beers</option>
        </select>
      </div>
      <div class="form-group">
        <label for="price">Price (USD) *</label>
        <input type="number" id="price" step="0.01" min="0" required placeholder="e.g. 28.00">
      </div>
      <div class="form-group">
        <label for="image">Image URL</label>
        <input type="url" id="image" placeholder="https://images.unsplash.com/...">
      </div>
      <div class="form-group">
        <label for="description">Description *</label>
        <textarea id="description" required placeholder="Describe the dish..."></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Item</button>
        <a href="index.html" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
    <div id="message"></div>
  </div>

  <script>
    const API_URL = 'https://restaurant-website-production-e3b2.up.railway.app/api';

    document.getElementById('addMenuForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('message');
      const btn = e.target.querySelector('button[type="submit"]');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
      btn.disabled = true;

      const data = {
        name: document.getElementById('name').value,
        category: document.getElementById('category').value,
        price: parseFloat(document.getElementById('price').value),
        image: document.getElementById('image').value || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80',
        description: document.getElementById('description').value,
      };

      try {
        const res = await fetch(`${API_URL}/menu`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const result = await res.json();
        if (result.success) {
          msg.style.display = 'block';
          msg.style.background = 'rgba(40,167,69,0.1)';
          msg.style.border = '1px solid rgba(40,167,69,0.3)';
          msg.style.color = '#28a745';
          msg.innerHTML = '<i class="fas fa-check-circle"></i> Menu item added successfully!';
          e.target.reset();
        } else {
          throw new Error(result.message);
        }
      } catch {
        let items = JSON.parse(localStorage.getItem('adminMenuItems')) || [];
        data.id = Date.now().toString();
        items.push(data);
        localStorage.setItem('adminMenuItems', JSON.stringify(items));
        msg.style.display = 'block';
        msg.style.background = 'rgba(40,167,69,0.1)';
        msg.style.border = '1px solid rgba(40,167,69,0.3)';
        msg.style.color = '#28a745';
        msg.innerHTML = '<i class="fas fa-check-circle"></i> Menu item saved locally!';
        e.target.reset();
      }

      btn.innerHTML = '<i class="fas fa-save"></i> Add Item';
      btn.disabled = false;
      setTimeout(() => { msg.style.display = 'none'; }, 4000);
    });
  </script>
</body>
</html>

services:
  - type: web
    name: restaurant-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-db
          property: connectionString

databases:
  - name: restaurant-db
    plan: free
    databaseName: restaurant_db
